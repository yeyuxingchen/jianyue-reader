<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data: file: cacheimg:; connect-src 'self' https: http: ws: wss: blob: data:;" />
    <title>简阅</title>
    <script>
      if (!Object.groupBy) {
        Object.groupBy = function(iterable, callbackfn) {
          var result = {};
          for (var item of iterable) {
            var key = callbackfn(item);
            if (!result[key]) result[key] = [];
            result[key].push(item);
          }
          return result;
        };
      }
      if (!Map.groupBy) {
        Map.groupBy = function(iterable, callbackfn) {
          var result = new Map();
          for (var item of iterable) {
            var key = callbackfn(item);
            if (!result.has(key)) result.set(key, []);
            result.get(key).push(item);
          }
          return result;
        };
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
